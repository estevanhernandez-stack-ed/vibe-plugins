name: npm download stats

on:
  schedule:
    # 14:00 UTC = 09:00 America/Chicago (CST).
    # DST shifts this to 08:00 local in summer; re-evaluate if that bothers Este.
    - cron: "0 14 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: npm-stats
  cancel-in-progress: false

jobs:
  collect:
    name: Collect and commit daily npm stats
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          # Full history so `git pull --rebase` works in the push-with-retry loop below.
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run npm-stats collector
        run: python scripts/npm-stats.py

      - name: Commit snapshot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/stats/

          if git diff --cached --quiet; then
            echo "no stats changes — skipping commit"
            exit 0
          fi

          DAY="$(date -u +%Y-%m-%d)"
          git commit -m "stats: daily npm download snapshot ${DAY}"

          # Push with retry — pull-rebase between attempts handles concurrent
          # pushes to main during the workflow's execution window. Without
          # this, any push to main after checkout (e.g. a doc fix or a marketplace
          # ref bump) causes a non-fast-forward rejection and the snapshot is lost.
          push_with_retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if git push 2>&1; then
                return 0
              fi
              echo "::notice::push attempt ${attempt} rejected — fetching + rebasing onto origin/main"
              git fetch origin main || return 1
              git rebase origin/main || return 1
              sleep "$((attempt * 2))"
            done
            echo "::error::push failed after 5 attempts — concurrent activity on main is excessive" >&2
            return 1
          }
          push_with_retry
